  /subscriptions:
    get:
      tags:
        - subscriptions
      operationId: getSubscriptions
      description: "Если ваш бот получает данные через Webhook, этот метод возвращает список всех подписок \n\n> ! Получение обновлений с помощью [Long\_Polling](/docs-api/methods/GET/updates) ограничено по скорости и сроку хранения событий\_— этот способ не подходит для production-окружения. Рекомендуем на всех этапах работы использовать [Webhook](/docs-api/methods/POST/subscriptions)\n\n>Обратите внимание: для отправки вебхуков поддерживается только протокол HTTPS, включая самоподписанные сертификаты. HTTP не поддерживается\n\nПример запроса:\n```bash\ncurl -X GET \"https://platform-api.max.ru/subscriptions\" \\\n  -H \"Authorization: {access_token}\"\n```"
      summary: Получение всех подписок через Webhook
      responses:
        '200':
          description: Ожидаемый результат
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSubscriptionsResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - subscriptions
      operationId: subscribe
      description: "Метод настраивает доставку событий бота через Webhook\_ — основной механизм получения событий в продуктовых интеграциях. При активной подписке Long\_Polling не работает \n\n> ! Получение обновлений с помощью [Long\_Polling](/docs-api/methods/GET/updates) ограничено по скорости и сроку хранения событий\_— этот способ не подходит для production-окружения. Рекомендуем на всех этапах работы использовать [Webhook](/docs-api/methods/POST/subscriptions)\n\n## Модель доставки событий\n\nПосле вызова метода `POST /subscriptions` события отправляются на указанный Webhook-endpoint в виде HTTPS POST-запросов с объектом [`Update`](https://dev.max.ru/docs-api/objects/Update)\n\nКак обрабатывается событие:\n\n1. При наступлении события выполняется вызов Webhook-endpoint\n2. Выполняется TLS-валидация целевого endpoint для безопасной передачи данных\n3. На endpoint отправляется HTTPS-запрос\n4. Если при создании подписки указан `secret`, проверяется заголовок `X-Max-Bot-Api-Secret` \n5. При успешной валидации возвращается HTTP `200 OK`\n6. Выполняется обработка события\n7. Инициируются вызовы MAX API\n\n\n## Требования к Webhook-endpoint\n\n### URL и порт\n\nWebhook-endpoint должен быть доступен по HTTPS на порту 443. Ваш сервер должен прослушивать этот порт. Порт в URL не указывается:\n\n```\nhttps://your-domain.com/webhook\n```\n\n> Поддерживается только порт 443. Если endpoint недоступен, события не доставляются\n\n### Безопасность соединения (TLS)\n\nПеред отправкой событий устанавливается HTTPS-соединение, и Webhook-endpoint проверяется на соответствие следующим требованиям безопасности соединения:\n- Webhook-endpoint удостоверен TLS-сертификатом, выданным доверенным центром сертификации. Самоподписанные сертификаты не поддерживаются \n- Доменное имя в URL Webhook-endpoint совпадает с CN или SAN сертификата\n- Сервер предоставляет полную цепочку сертификатов\n\n> Если проверка не пройдена, события не доставляются\n\n### Обработка запросов\n\nWebhook-endpoint должен возвращать **HTTP 200** в течение 30 секунд. Любой другой код ответа или превышение тайм-аута считается ошибкой доставки\n\nПример запроса:\n```bash\ncurl -X POST \"https://platform-api.max.ru/subscriptions\" \\\n  -H \"Authorization: {access_token}\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n  \"url\": \"https://your-domain.com/webhook\",\n  \"update_types\": [\"message_created\", \"bot_started\"],\n  \"secret\": \"your_secret\"\n}'\n```\n\n### Политика повторных попыток\n\nЕсли доставка не удалась, выполняется до 10 повторных попыток с экспоненциально растущим интервалом:\n\n- 1-я попытка: через 60 секунд\n- 2-я попытка: через 150 секунд (60 × 2,5)\n- 3-я попытка: через 375 секунд (150 × 2,5)\n- и так далее\n\n> Если в течение 8 часов от Webhook-endpoint не получен успешный ответ, бот автоматически от него отписывается\n\n## Безопасность Webhook-запросов\n\n Параметр `secret` позволяет убедиться, что Webhook-запросы приходят от MAX, а не от третьей стороны. Это необязательный параметр, но мы настоятельно рекомендуем указывать его. Проверяйте значение заголовка `X-Max-Bot-Api-Secret` на Webhook-сервере и отклоняйте запросы при несоответствии \n\nЕсли `secret` указан при создании подписки, он передаётся в заголовке `X-Max-Bot-Api-Secret` каждого Webhook-запроса\n\n  \n\n---\n\n## Формат и типы событий\n\nWebhook-запрос содержит объект [`Update`](https://dev.max.ru/docs-api/objects/Update)\n\nПолный список типов событий и структура объекта описаны в разделе [Update](https://dev.max.ru/docs-api/objects/Update)"
      summary: Подписка на обновления о новых событиях через Webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - subscriptions
      operationId: unsubscribe
      description: "Отписывает бота от получения обновлений о новых событиях через Webhook. После вызова этого метода бот перестаёт получать уведомления о новых событиях на Webhook-endpoint, и становится доступна доставка уведомлений через Long Polling \n\n  > ! Получение обновлений с помощью [Long\_Polling](/docs-api/methods/GET/updates) ограничено по скорости и сроку хранения событий\_— этот способ не подходит для production-окружения. Рекомендуем на всех этапах работы использовать [Webhook](/docs-api/methods/POST/subscriptions)\n\nПример запроса:\n```bash\ncurl -X DELETE \"https://platform-api.max.ru/subscriptions?url=https://your-domain.com/webhook\" \\\n  -H \"Authorization: {access_token}\"\n```"
      summary: Отписка от обновлений о новых событиях через Webhook
      parameters:
        - name: url
          in: query
          description: URL, который нужно удалить из подписок на WebHook
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /uploads:
    post:
      tags:
        - upload
      operationId: getUploadUrl
      description: >+
        Возвращает URL для последующей загрузки файла


        > Параметр `type=photo` больше не поддерживается. Если вы использовали
        `type=photo` в ранее созданных интеграциях — замените его на
        `type=image`


        Поддерживаются два типа загрузки:

        - **Multipart upload** — более простой, но менее надёжный способ. В этом
        случае используется заголовок `Content-Type: multipart/form-data`. Файл
        отправляется целиком одним запросом. Если загрузка прервётся, невозможно
        её возобновить — придётся начать заново

            
        - **Resumable upload** — более надёжный способ, если заголовок
        `Content-Type` не равен `multipart/form-data`. Этот способ позволяет
        загружать файл частями и возобновить загрузку с последней успешно
        загруженной части в случае ошибок

         Общие ограничения для обоих типов загрузки:
        - Максимальный размер файла: 4 ГБ

        - Можно загружать только один файл за раз


        Пример получения ссылки для загрузки:


        ```bash

        curl -X POST "https://platform-api.max.ru/uploads?type=file" \
          -H "Authorization: {access_token}"
        ```


        Пример загрузки файла по полученному URL:


        ```bash

        curl -X POST "%UPLOAD_URL%" \
          -H "Authorization: {access_token}" \
          -F "data=@example.mp4"
        ```


        Пример использования cURL для загрузки файла (вариант multipart upload):


        ```shell

        curl -i -X POST \
          -H "Content-Type: multipart/form-data" \
          -F "data=@movie.pdf" "%UPLOAD_URL%"
        ```


        Где `%UPLOAD_URL%` — это URL из результата метода в примере cURL запроса


        **Для загрузки видео и аудио:**


        1. Когда получаем ссылку на загрузку видео или аудио (`POST /uploads` с
        `type` = `video` или `type` = `audio`), вместе с `url` в ответе приходит
        `token`, который нужно использовать в сообщении (когда формируете `body`
        с `attachments`) в `POST /messages`.


        2. После загрузки видео или аудио (по `url` из шага выше) сервер
        возвращает `retval`


        3. C этого момента можно использовать `token`, чтобы прикреплять
        вложение в сообщение бота


        Механика отличается от `type` = `image` | `file`, где `token`
        возвращается в ответе на загрузку изображения или файла


        ## Прикрепление медиа

        Медиафайлы прикрепляются к сообщениям поэтапно:


        1. Получите URL для загрузки медиафайлов

        2. Загрузите файл по полученному URL

        3. После успешной загрузки получите JSON-объект в ответе. Используйте
        этот объект для создания вложения. Структура вложения:
            - `type`: тип медиа (например, `"video"`)
            - `payload`: JSON-объект, который вы получили

        Пример для видео:

        1. Получите URL для загрузки:

        ```bash

        curl -X POST "https://platform-api.max.ru/uploads?type=video" \
          -H "Authorization: {access_token}"
        ```


        Ответ:

        ```json

        {
            "url": "https://vu.mycdn.me/upload.do…"
        }

        ```


        2. Загрузите видео по URL:


        ```bash

        curl -X POST \
          -H "Content-Type: multipart/form-data" \
          -F "data=@movie.mp4" \
          "https://vu.mycdn.me/upload.do?sig={signature}&expires={timestamp}"
        ```


        Ответ:

        ```json

        {
            "token": "_3Rarhcf1PtlMXy8jpgie8Ai_KARnVFYNQTtmIRWNh4"
        }

        ```


        3. Отправьте сообщение с вложением:


        ```json

        {
            "text": "Message with video",
            "attachments": [
                {
                    "type": "video",
                    "payload": {
                        "token": "_3Rarhcf1PtlMXy8jpgie8Ai_KARnVFYNQTtmIRWNh4"
                    }
                }
            ]
        }

        ```


        ## Обработка файлов


        После успешной загрузки сервер обрабатывает файл. Файлы от нескольких
        мегабайт обрабатываются дольше


        > Для стабильной работы сервисов MAX убедитесь, что максимальное
        количество запросов в секунду на platform-api.max.ru — 30 rps 


        Если отправить сообщение с вложением сразу после загрузки, может
        возникнуть ошибка:


        ```json

        {
          "code": "attachment.not.ready",
          "message": "Key: errors.process.attachment.file.not.processed"
        }

        ```


        **Как избежать ошибки:**

        - После загрузки файла сделайте паузу перед отправкой сообщения

        - Если отправка не удалась, повторите попытку через некоторое время.
        Увеличивайте интервал с каждой попыткой

        - Загружайте часто используемые файлы заранее и переиспользуйте токен

      summary: Загрузка файлов
      parameters:
        - description: >-
            Тип загружаемого файла. Возможные значения: `"image"`, `"video"`,
            `"audio"`, `"file"`
          name: type
          required: true
          in: query
          schema:
            $ref: '#/components/schemas/UploadType'
      responses:
        '200':
          description: Возвращает URL для загрузки вложения.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadEndpoint'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /messages:
    get:
      tags:
        - messages
      operationId: getMessages
      description: >-
        Метод возвращает информацию о сообщении или массив сообщений из чата.
        Для выполнения запроса нужно указать один из параметров — `chat_id` или
        `message_ids`:


        - `chat_id` — метод возвращает массив сообщений из указанного чата.
        Сообщения возвращаются в обратном порядке: последние сообщения будут
        первыми в массиве


        - `message_ids` — метод возвращает информацию о запрошенных сообщениях.
        Можно указать один идентификатор или несколько


        Пример запроса с использованием `chat_id`:

        ```bash

        curl -X GET "https://platform-api.max.ru/messages?chat_id={chat_id}" \
          -H "Authorization: {access_token}"
        ```


        Пример запроса с использованием `message_ids`:

        ```bash

        curl -X GET
        "https://platform-api.max.ru/messages?message_ids={message_id1},{message_id2}"
        \
          -H "Authorization: {access_token}"
        ```
      summary: Получение сообщений
      parameters:
        - description: ' ID чата, чтобы получить сообщения из определённого чата. Обязательный параметр, если не указан `message_ids`'
          name: chat_id
          in: query
          schema:
            $ref: '#/components/schemas/bigint'
        - description: >-
            Список ID сообщений, которые нужно получить (через запятую).
            Обязательный параметр, если не указан `chat_id`
          name: message_ids
          in: query
          style: simple
          schema:
            uniqueItems: true
            items:
              type: string
            nullable: true
        - name: from
          description: Время начала для запрашиваемых сообщений (в формате Unix timestamp)
          in: query
          schema:
            $ref: '#/components/schemas/bigint'
        - name: to
          description: >-
            Время окончания для запрашиваемых сообщений (в формате Unix
            timestamp)
          in: query
          schema:
            $ref: '#/components/schemas/bigint'
        - name: count
          description: Максимальное количество сообщений в ответе
          in: query
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Возвращает список сообщений
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: >-
            Это исключение возникает, когда пользователь приостановил бота или у
            него нет доступа к чату
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - messages
      operationId: sendMessage
      description: >
        Отправляет сообщение в чат


        Ниже — пример запроса с одной кнопкой-ссылкой. Больше примеров запросов
        с кнопками — [в разделе «Клавиатура»](/docs-api#Как%20добавить%20кнопки)

        ````bash

        curl -X POST "https://platform-api.max.ru/messages?user_id={user_id}" \
          -H "Authorization: {access_token}" \
          -H "Content-Type: application/json" \
          -d '{
          "text": "Это сообщение с кнопкой-ссылкой",
          "attachments": [
            {
              "type": "inline_keyboard",
              "payload": {
                "buttons": [
                  [
                    {
                      "type": "link",
                      "text": "Откройте сайт",
                      "url": "https://example.com"
                    }
                  ]
                ]
              }
            }
          ]
         }'
      summary: Отправить сообщение
      parameters:
        - name: user_id
          description: Если вы хотите отправить сообщение пользователю, укажите его ID
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: chat_id
          description: Если сообщение отправляется в чат, укажите его ID
          schema:
            type: integer
            format: int64
          in: query
          required: false
        - name: disable_link_preview
          description: ' Если `false`, сервер не будет генерировать превью для ссылок в тексте сообщения'
          in: query
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewMessageBody'
      responses:
        '200':
          description: Возвращает информацию о созданном сообщении
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
        - messages
      operationId: editMessage
      description: >-
        Редактирует сообщение в чате. Если поле `attachments` равно `null`,
        вложения текущего сообщения не изменяются. Если в этом поле передан
        пустой список, все вложения будут удалены


        >  С помощью метода можно отредактировать сообщения, которые отправлены
        менее 24 часов назад


        Пример запроса:

        ```bash

        curl -X PUT "https://platform-api.max.ru/messages?message_id=message_id"
        \
          -H "Authorization: {access_token}" \
          -H "Content-Type: application/json" \
          -d '{
          "text": "Изменённый текст"
        }'

        ```
      summary: Редактировать сообщение
      parameters:
        - name: message_id
          description: ID редактируемого сообщения
          required: true
          in: query
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewMessageBody'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /messages/{messageId}:
    get:
      tags:
        - messages
      operationId: getMessageById
      description: |-
        Возвращает сообщение по его ID

        Пример запроса:
        ```bash
        curl -X GET "https://platform-api.max.ru/messages/{messageId}" \
          -H "Authorization: {access_token}"
        ```
      summary: Получить сообщение
      parameters:
        - description: ID сообщения (`mid`), чтобы получить одно сообщение в чате
          in: path
          name: messageId
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9_\-]+'
      responses:
        '200':
          description: Возвращает одно сообщение
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: В случае, если сообщение не найдено или бот не имеет доступа к нему
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /videos/{videoToken}:
    get:
      tags:
        - messages
      operationId: getVideoAttachmentDetails
      description: >-
        Возвращает подробную информацию о прикреплённом видео. URL-адреса
        воспроизведения и дополнительные метаданные


        Пример запроса:

        ```bash

        curl -X GET "https://platform-api.max.ru/videos/{video_token}" \
          -H "Authorization: {access_token}"
      summary: Получить информацио о видео
      parameters:
        - description: Токен видео-вложения
          in: path
          name: videoToken
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9_\-]+'
      responses:
        '200':
          description: Detailed video attachment info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoAttachmentDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: В случае, если сообщение не найдено или бот не имеет доступа к нему
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
  /answers:
    post:
      tags:
        - messages
      operationId: answerOnCallback
      description: >-
        Этот метод используется для отправки ответа после того, как пользователь
        нажал на кнопку. Ответом может быть обновленное сообщение и/или
        одноразовое уведомление для пользователя


        Пример запроса:

        ```bash

        curl -X POST
        "https://platform-api.max.ru/answers?callback_id=callback_id" \
          -H "Authorization: {access_token}" \
          -H "Content-Type: application/json" \
          -d '{
            "message": {
              "text": "Это сообщение с кнопкой-ссылкой",
              "attachments": [
                {
                  "type": "inline_keyboard",
                  "payload": {
                    "buttons": [
                      [
                        {
                          "type": "link",
                          "text": "Откройте сайт",
                          "url": "https://example.com"
                        }
                      ]
                    ]
                  }
                }
              ]
            }
          }'
        ```
      summary: Ответ на callback
      parameters:
        - name: callback_id
          description: "Идентификатор кнопки, на которую нажал пользователь\n\n Идентификатор можно получить в обновлениях о событиях через [Webhook](/docs-api/methods/POST/subscriptions) или [Long\_Polling](/docs-api/methods/GET/updates)\n\n Получение обновлений с помощью [Long\_Polling](/docs-api/methods/GET/updates) ограничено по скорости и сроку хранения событий\_— этот способ не подходит для production-окружения. Рекомендуем на всех этапах работы использовать [Webhook](/docs-api/methods/POST/subscriptions)\n\n Когда пользователь нажмёт на кнопку, МАКС отправит событие, содержащее объект [Update](/docs-api/objects/Update) с типом `message_callback` и идентификатором кнопки в поле `updates[i].callback.callback_id`"
          required: true
          in: query
          schema:
            type: string
            minLength: 1
            pattern: ^(?!\s*$).+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallbackAnswer'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/NotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
  /updates:
    get:
      operationId: getUpdates
      tags:
        - subscriptions
      description: " > ! Получение обновлений с помощью [Long\_Polling](/docs-api/methods/GET/updates) ограничено по скорости и сроку хранения событий\_— этот способ не подходит для production-окружения. Рекомендуем на всех этапах работы использовать [Webhook](/docs-api/methods/POST/subscriptions)\n\nМетод `GET /updates` можно использовать для получения обновлений при разработке и тестировании, если ваш бот не подписан на Webhook. **Для production-окружения используйте только Webhook**\n\n  Каждое обновление со списком событий имеет свой порядковый номер. Свойство `marker` в ответе указывает на следующее ожидаемое обновление. После того, как вы передали `marker` с указателем на конкретное обновление, все предыдущие считаются прочитанными \n\n Если параметр `marker` **не передан** или передано значение `null`, вы получите только последнее обновление \n\n**Пример запроса:**\n```bash\ncurl -X GET \"https://platform-api.max.ru/updates\" \\\n  -H \"Authorization: {access_token}\"\n```"
      summary: "Получение обновлений о событиях через Long\_Polling"
      parameters:
        - name: limit
          description: >-
            Максимальное количество обновлений о событиях, которое может
            вернуться в ответе на запрос
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: timeout
          description: Тайм-аут в секундах для долгого опроса
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 90
            default: 30
        - name: marker
          description: >-
            Чтобы получить последнее обновление событий, передайте `null` или
            оставьте поле пустым. Чтобы получить все обновления по событиям с
            момента предыдущего запроса, передайте значение `marker`, которое
            получили в ответ на предыдущий запрос
          in: query
          schema:
            type: integer
            format: int64
            nullable: true
        - name: types
          description: >-
            Список типов событий, которые вы хотите получать, например:
            `message_created`, `message_callback`. Полный список возможных
            событий смотрите в описании [объекта
            `Update`](/docs-api/objects/Update)
          in: query
          example: types=message_created,message_callback
          schema:
            type: array
            uniqueItems: true
            items:
              type: string
            nullable: true
          style: simple
      responses:
        '200':
          description: Список обновлений событий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '405':
          $ref: '#/components/responses/NotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    access_token:
      type: apiKey
      name: access_token
      description: >-
        A token is given to you by [MasterBot](https://tt.me/MasterBot) after
        you have created a bot.

        In all subsequent requests to the Bot API, you **must** pass the
        received token as an `access_token` parameter to the HTTP request.



        If [Terms and Conditions of Max usage](https://team.max.ru/en/terms/)
        have been violated, the Max administration may withdraw tokens by
        aborting user sessions.

        If your token has been compromised, you can request a new one by sending
        a `/revoke` command to **[MasterBot](https://tt.me/MasterBot)**.
      in: query
  responses:
    SuccessResponse:
      description: Успешный или неуспешный результат
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleQueryResult'
    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: >-
        Ошибка авторизации. Не предоставлен `access_token` или токен
        недействителен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Ошибка доступа. У вас нет прав на доступ к этому ресурсу
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Запрашиваемый ресурс не найден
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotAllowed:
      description: Метод не разрешен
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    bigint:
      type: integer
      format: int64
    User:
      description: "Объект, описывающий один из вариантов наследования:\n\n- [`User`](/docs-api/objects/User)\_— объект содержит общую информацию о пользователе или боте без аватара\n- [`UserWithPhoto`](/docs-api/objects/UserWithPhoto)\_— объект с общей информацией о пользователе или боте, дополнительно содержит URL аватара и описание\n- [`BotInfo`](/docs-api/objects/BotInfo)\_— объект включает общую информацию о боте, URL аватара и описание. Дополнительно содержит список команд, поддерживаемых ботом. Возвращается только при вызове метода [`GET\_/me`](/docs-api/methods/GET/me)\n- [`ChatMember`](/docs-api/objects/ChatMember)\_— объект включает общую информацию о пользователе или боте, URL аватара и описание при его наличии. Дополнительно содержит данные для пользователей-участников чата. Возвращается только при вызове некоторых методов группы `/chats`, например [`GET\_/chats/{chatId}/members`](/docs-api/methods/GET/chats/-chatId-/members)"
      properties:
        user_id:
          description: Идентификатор пользователя или бота
          type: integer
          format: int64
        first_name:
          description: Отображаемое имя пользователя или бота
          type: string
        last_name:
          description: >-
            Отображаемая фамилия пользователя. Для ботов это поле не
            возвращается
          type: string
          nullable: true
        username:
          description: >-
            Никнейм бота или уникальное публичное имя пользователя. В случае с
            пользователем может быть `null`, если тот недоступен или имя не
            задано
          type: string
          nullable: true
        is_bot:
          description: '`true`, если это бот'
          type: boolean
        last_activity_time:
          description: >-
            Время последней активности пользователя или бота в MAX (Unix-время в
            миллисекундах). Если пользователь отключил в настройках профиля
            мессенджера MAX возможность видеть, что он в сети онлайн, поле может
            не возвращаться
          type: integer
          format: int64
        name:
          description: _Устаревшее поле, скоро будет удалено_
          type: string
          readOnly: true
          nullable: true
      required:
        - user_id
        - first_name
        - username
        - is_bot
        - last_activity_time
        - name
    UserWithPhoto:
      description: >-
        Объект с общей информацией о пользователе или боте, дополнительно
        содержит URL аватара и описание
      allOf:
        - $ref: '#/components/schemas/User'
        - properties:
            description:
              description: >-
                Описание пользователя или бота. В случае с пользователем может
                принимать значение `null`, если описание не заполнено
              maxLength: 16000
              type: string
              nullable: true
              readOnly: false
            avatar_url:
              description: URL аватара пользователя или бота в уменьшенном размере
              type: string
              readOnly: false
            full_avatar_url:
              description: URL аватара пользователя или бота в полном размере
              type: string
              readOnly: false
    BotInfo:
      description: "Объект включает общую информацию о боте, URL аватара и описание. Дополнительно содержит список команд, поддерживаемых ботом. Возвращается только при вызове метода `GET\_/me`"
      allOf:
        - $ref: '#/components/schemas/UserWithPhoto'
        - properties:
            commands:
              description: Команды, поддерживаемые ботом
              type: array
              items:
                $ref: '#/components/schemas/BotCommand'
              maxItems: 32
              readOnly: false
              nullable: true
    BotPatch:
      properties:
        first_name:
          description: Отображаемое имя пользователя или название бота
          type: string
          maxLength: 64
          minLength: 1
          readOnly: false
          nullable: true
        last_name:
          description: Отображаемое второе имя бота
          type: string
          maxLength: 64
          minLength: 1
          readOnly: false
          nullable: true
        name:
          description: _Поле устарело, скоро будет удалено. Используйте_ `first_name`
          type: string
          readOnly: false
          nullable: true
        description:
          description: Описание бота
          type: string
          minLength: 1
          maxLength: 16000
          readOnly: false
          nullable: true
        commands:
          description: >-
            Команды, поддерживаемые ботом. Чтобы удалить все команды, передайте
            пустой список
          type: array
          items:
            $ref: '#/components/schemas/BotCommand'
          maxItems: 32
          readOnly: false
          nullable: true
        photo:
          description: Запрос на установку фото бота
          allOf:
            - $ref: '#/components/schemas/PhotoAttachmentRequestPayload'
          readOnly: false
          nullable: true
    BotCommand:
      description: до 32 элементов<br/>Команды, поддерживаемые ботом
      properties:
        name:
          description: Название команды
          type: string
          maxLength: 64
          minLength: 1
        description:
          description: Описание команды
          type: string
          minLength: 1
          maxLength: 128
          readOnly: false
          nullable: true
      required:
        - name
    Chat:
      properties:
        chat_id:
          description: ID чата
          type: integer
          format: int64
        type:
          description: |-
            Тип чата:
             - `"chat"` — Групповой чат
             - `"channel"` — Канал
             - `"dialog"` — Диалог
          allOf:
            - $ref: '#/components/schemas/ChatType'
        status:
          description: |-
            Статус чата:
            - `"active"` — Бот является активным участником чата
            - `"removed"` — Бот был удалён из чата
            - `"left"` — Бот покинул чат
            - `"closed"` — Чат был закрыт
          allOf:
            - $ref: '#/components/schemas/ChatStatus'
        title:
          description: Отображаемое название чата. Может быть `null` для диалогов
          type: string
          nullable: true
        icon:
          description: Иконка чата
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Image'
        last_event_time:
          description: Время последнего события в чате
          type: integer
          format: int64
        participants_count:
          description: Количество участников чата. Для диалогов всегда `2`
          type: integer
          format: int32
        owner_id:
          description: ID владельца чата
          nullable: true
          type: integer
          format: int64
          readOnly: false
        participants:
          description: >-
            Участники чата с временем последней активности. Может быть `null`,
            если запрашивается список чатов
          nullable: true
          readOnly: false
          type: object
          additionalProperties:
            type: integer
            format: int64
        is_public:
          description: Доступен ли чат публично (для диалогов всегда `false`)
          type: boolean
        link:
          description: Ссылка на чат
          type: string
          readOnly: false
          nullable: true
        description:
          description: Описание чата
          type: string
          nullable: true
        dialog_with_user:
          description: Данные о пользователе в диалоге (только для чатов типа `"dialog"`)
          allOf:
            - $ref: '#/components/schemas/UserWithPhoto'
          nullable: true
          readOnly: false
        messages_count:
          description: Количество сообщений в групповых чатах и каналах
          nullable: true
          readOnly: false
          type: integer
        chat_message_id:
          description: >-
            Идентификатор сообщения с кнопкой, через которую был инициирован
            чата
          nullable: true
          readOnly: false
          type: string
        pinned_message:
          description: >-
            Закреплённое сообщение в чате (возвращается только при запросе
            конкретного чата)
          nullable: true
          readOnly: false
          allOf:
            - $ref: '#/components/schemas/Message'
      required:
        - chat_id
        - type
        - status
        - title
        - last_event_time
        - participants_count
        - icon
        - is_public
        - description
    ChatType:
      description: 'Тип чата: диалог, чат'
      enum:
        - chat
    ChatStatus:
      description: Статус чата для текущего бота
      enum:
        - active
        - removed
        - left
        - closed
    ChatList:
      properties:
        chats:
          description: Список запрашиваемых чатов
          type: array
          items:
            $ref: '#/components/schemas/Chat'
        marker:
          description: Указатель на следующую страницу запрашиваемых чатов
          nullable: true
          type: integer
          format: int64
      required:
        - chats
        - marker
    ChatPatch:
      properties:
        icon:
          readOnly: false
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PhotoAttachmentRequestPayload'
        title:
          type: string
          minLength: 1
          maxLength: 200
          readOnly: false
          nullable: true
        pin:
          description: >-
            ID сообщения для закрепления в чате. Чтобы удалить закреплённое
            сообщение, используйте метод
            [unpin](/docs-api/methods/DELETE/chats/%7BchatId%7D/pin)
          type: string
          readOnly: false
          nullable: true
        notify:
          description: Если `true`, участники получат системное уведомление об изменении
          type: boolean
          default: true
          readOnly: false
          nullable: true
    ChatMember:
      description: "Объект включает общую информацию о пользователе или боте, URL аватара и описание (при наличии). Дополнительно содержит данные для пользователей-участников чата. Возвращается только при вызове некоторых методов группы `/chats`, например [`GET\_/chats/{chatId}/members`](/docs-api/methods/GET/chats/-chatId-/members)"
      allOf:
        - $ref: '#/components/schemas/UserWithPhoto'
        - properties:
            last_access_time:
              description: >-
                Время последней активности пользователя в чате. Может быть
                устаревшим для суперчатов (равно времени вступления)
              type: integer
              format: int64
            is_owner:
              type: boolean
              description: Является ли пользователь владельцем чата
            is_admin:
              type: boolean
              description: Является ли пользователь администратором чата
            join_time:
              type: integer
              format: int64
              description: Дата присоединения к чату в формате Unix time
            permissions:
              description: |
                Перечень прав пользователя. Возможные значения:
                - `"read_all_messages"` — Читать все сообщения.
                - `"add_remove_members"` — Добавлять/удалять участников.
                - `"add_admins"` — Добавлять администраторов.
                - `"change_chat_info"` — Изменять информацию о чате.
                - `"pin_message"` — Закреплять сообщения.
                - `"write"` — Писать сообщения.
                - `"edit_link"` — Изменять ссылку на чат.
              type: array
              uniqueItems: true
              nullable: true
              items:
                allOf:
                  - $ref: '#/components/schemas/ChatAdminPermission'
            alias:
              description: >-
                Заголовок, который будет показан на клиенте


                Если пользователь администратор или владелец и ему не
                установлено это название, то поле не передаётся, клиенты на
                своей стороне подменят на "владелец" или "админ"
              type: string
          required:
            - last_access_time
            - is_owner
            - is_admin
            - permissions
            - join_time
    ChatAdmin:
      properties:
        user_id:
          description: >-
            Идентификатор пользователя-участника чата, который назначается
            администратором


            Максимум — 50 администраторов в чате
          type: integer
          format: int64
        permissions:
          description: >-
            Перечень прав доступа пользователя. Возможные значения:

            - `"read_all_messages"` — Читать все сообщения. Это право важно при
            назначении ботов: без него бот не будет получать обновления через
            [Webhook](/docs-api/methods/POST/subscriptions) в групповом чате или
            канале

            - `"add_remove_members"` — Добавлять/удалять участников

            - `"add_admins"` — Добавлять администраторов

            - `"change_chat_info"` — Изменять информацию о чате

            - `"pin_message"` — Закреплять сообщения

            - `"write"` — Писать сообщения

            - `"can_call"` — Совершать звонки

            - `"edit_link"` — Изменять ссылку на чат

            - `"post_edit_delete_message"` — Публиковать, редактировать и
            удалять сообщения

            - `"edit_message"` — Редактировать сообщения

            - `"delete_message"` — Удалять сообщения


            Если право назначается администратору, то обновляются его текущие
            права доступа
          type: array
          uniqueItems: true
          items:
            allOf:
              - $ref: '#/components/schemas/ChatAdminPermission'
        alias:
          description: >-
            Заголовок, который будет показан на клиенте


            Если пользователь администратор или владелец и ему не установлено
            это название, то поле не передаётся, клиенты на своей стороне
            подменят на "владелец" или "админ"
          type: string
      required:
        - user_id
        - permissions
    ChatAdminPermission:
      description: Права администратора чата
      type: string
      enum:
        - read_all_messages
        - add_remove_members
        - add_admins
        - change_chat_info
        - pin_message
        - write
        - can_call
        - edit_link
        - post_edit_delete_message
        - edit_message
        - delete_message
    ChatMembersList:
      properties:
        members:
          description: Список участников чата с информацией о времени последней активности
          type: array
          items:
            $ref: '#/components/schemas/ChatMember'
        marker:
          description: Указатель на следующую страницу данных
          type: integer
          format: int64
          nullable: true
          readOnly: false
      required:
        - members
    ChatAdminsList:
      properties:
        admins:
          description: Список пользователей, которые получат права администратора чата
          type: array
          items:
            $ref: '#/components/schemas/ChatAdmin'
        marker:
          description: Указатель на следующую страницу данных
          type: integer
          format: int64
          nullable: true
          readOnly: false
      required:
        - admins
    Image:
      description: Общая схема, описывающая объект изображения
      properties:
        url:
          description: URL изображения
          type: string
      required:
        - url
    Subscription:
      description: Схема для описания подписки на WebHook
      properties:
        url:
          description: URL вебхука
          type: string
        time:
          description: Unix-время, когда была создана подписка
          type: integer
          format: int64
        update_types:
          description: Типы событий, на которые подписан бот
          example: '["message_created", "bot_started"]'
          type: array
          nullable: true
          uniqueItems: true
          items:
            type: string
            minLength: 1
      required:
        - url
        - time
        - update_types
    Recipient:
      description: Новый получатель сообщения. Может быть пользователем или чатом
      properties:
        chat_id:
          description: ID чата
          type: integer
          format: int64
          nullable: true
        chat_type:
          description: Тип чата
          allOf:
            - $ref: '#/components/schemas/ChatType'
        user_id:
          description: ID пользователя, если сообщение было отправлено пользователю
          type: integer
          format: int64
          nullable: true
      required:
        - chat_id
        - chat_type
        - user_id
    Message:
      description: Сообщение в чате
      properties:
        sender:
          description: Пользователь, отправивший сообщение
          allOf:
            - $ref: '#/components/schemas/User'
          readOnly: false
        recipient:
          description: Получатель сообщения. Может быть пользователем или чатом
          allOf:
            - $ref: '#/components/schemas/Recipient'
        timestamp:
          description: Время создания сообщения в формате Unix-time
          type: integer
          format: int64
        link:
          description: Пересланное или ответное сообщение
          nullable: true
          readOnly: false
          allOf:
            - $ref: '#/components/schemas/LinkedMessage'
        body:
          description: >-
            Содержимое сообщения. Текст + вложения. Может быть `null`, если
            сообщение содержит только пересланное сообщение
          allOf:
            - $ref: '#/components/schemas/MessageBody'
        stat:
          description: Статистика сообщения. Возвращается только для постов в каналах
          allOf:
            - $ref: '#/components/schemas/MessageStat'
          nullable: true
          readOnly: false
        url:
          description: >-
            Публичная ссылка на пост в канале. Отсутствует для диалогов и
            групповых чатов
          type: string
          nullable: true
          readOnly: false
      required:
        - recipient
        - body
        - timestamp
    MessageStat:
      description: Статистика сообщения. Возвращается только для постов в каналах
      properties:
        views:
          description: >-
            Количество пользователей, которые увидели пост в канале. Просмотр
            засчитывается, когда пост попадает в область видимости экрана
          type: integer
      required:
        - views
    MessageBody:
      description: Схема, представляющая тело сообщения
      type: object
      properties:
        mid:
          description: Уникальный ID сообщения
          type: string
        seq:
          description: ID последовательности сообщения в чате
          type: integer
          format: int64
        text:
          description: Новый текст сообщения
          type: string
          nullable: true
        attachments:
          description: >-
            Вложения сообщения. Могут быть одним из типов `Attachment`. Смотрите
            описание схемы
          type: array
          nullable: true
          required: false
          items:
            $ref: '#/components/schemas/Attachment'
        markup:
          description: >-
            Разметка текста сообщения. Для подробной информации загляните в
            раздел
            [Форматирование](/docs-api#Форматирование%20текста%20в%20сообщениях)
          type: array
          nullable: true
          readOnly: false
          items:
            $ref: '#/components/schemas/MarkupElement'
      required:
        - mid
        - seq
        - text
        - attachments
        - link
    MessageList:
      description: Пагинированный список сообщений
      properties:
        messages:
          description: Массив сообщений
          type: array
          items:
            $ref: '#/components/schemas/Message'
      required:
        - messages
    TextFormat:
      description: Формат текста сообщения
      type: string
      enum:
        - markdown
        - html
    NewMessageBody:
      properties:
        text:
          description: Новый текст сообщения
          type: string
          maxLength: 4000
          nullable: true
        attachments:
          description: Вложения сообщения. Если пусто, все вложения будут удалены
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AttachmentRequest'
        link:
          description: Ссылка на сообщение
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/NewMessageLink'
        notify:
          description: Если false, участники чата не будут уведомлены (по умолчанию `true`)
          type: boolean
          default: true
          readOnly: false
        format:
          description: >-
            Если установлен, текст сообщения будет форматирован данным способом.
            Для подробной информации загляните в раздел
            [Форматирование](/docs-api#Форматирование%20текста%20в%20сообщениях)
          readOnly: false
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TextFormat'
      required:
        - text
        - attachments
        - link
    NewMessageLink:
      properties:
        type:
          description: Тип ссылки сообщения
          nullable: false
          allOf:
            - $ref: '#/components/schemas/MessageLinkType'
        mid:
          description: ID сообщения исходного сообщения
          type: string
          nullable: false
      required:
        - type
        - mid
    LinkedMessage:
      properties:
        type:
          description: Тип связанного сообщения
          allOf:
            - $ref: '#/components/schemas/MessageLinkType'
        sender:
          description: Пользователь, отправивший сообщение.
          allOf:
            - $ref: '#/components/schemas/User'
          readOnly: false
        chat_id:
          description: >-
            Чат, в котором сообщение было изначально опубликовано. Только для
            пересланных сообщений
          type: integer
          format: int64
          readOnly: false
        message:
          allOf:
            - $ref: '#/components/schemas/MessageBody'
      required:
        - type
        - message
    SendMessageResult:
      properties:
        message:
          $ref: '#/components/schemas/Message'
      required:
        - message
    Attachment:
      description: Общая схема, представляющая вложение сообщения
      discriminator:
        propertyName: type
        mapping:
          image: '#/components/schemas/PhotoAttachment'
          video: '#/components/schemas/VideoAttachment'
          audio: '#/components/schemas/AudioAttachment'
          file: '#/components/schemas/FileAttachment'
          sticker: '#/components/schemas/StickerAttachment'
          contact: '#/components/schemas/ContactAttachment'
          inline_keyboard: '#/components/schemas/InlineKeyboardAttachment'
          share: '#/components/schemas/ShareAttachment'
          location: '#/components/schemas/LocationAttachment'
      properties:
        type:
          type: string
      required:
        - type
    PhotoAttachment:
      description: Вложение изображения
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/PhotoAttachmentPayload'
          required:
            - payload
    PhotoAttachmentPayload:
      properties:
        photo_id:
          description: Уникальный ID этого изображения
          type: integer
          format: int64
        token:
          description: ''
          type: string
        url:
          description: URL изображения
          type: string
      required:
        - photo_id
        - url
        - token
    VideoAttachment:
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/MediaAttachmentPayload'
            thumbnail:
              description: Миниатюра видео
              type: string
              nullable: true
              readOnly: false
              allOf:
                - $ref: '#/components/schemas/VideoThumbnail'
            width:
              description: Ширина видео
              type: integer
              nullable: true
              readOnly: false
            height:
              description: Высота видео
              type: integer
              nullable: true
              readOnly: false
            duration:
              description: Длина видео в секундах
              type: integer
              nullable: true
              readOnly: false
          required:
            - payload
    VideoThumbnail:
      properties:
        url:
          description: URL изображения
          type: string
      required:
        - url
    VideoUrls:
      properties:
        mp4_1080:
          description: URL видео в разрешении 1080p, если доступно
          type: string
          nullable: true
          readOnly: false
        mp4_720:
          description: URL видео в разрешении 720p, если доступно
          type: string
          nullable: true
          readOnly: false
        mp4_480:
          description: URL видео в разрешении 480p, если доступно
          type: string
          nullable: true
          readOnly: false
        mp4_360:
          description: URL видео в разрешении 360p, если доступно
          type: string
          nullable: true
          readOnly: false
        mp4_240:
          description: URL видео в разрешении 240p, если доступно
          type: string
          nullable: true
          readOnly: false
        mp4_144:
          description: URL видео в разрешении 144p, если доступно
          type: string
          nullable: true
          readOnly: false
        hls:
          description: URL трансляции, если доступна
          type: string
          nullable: true
          readOnly: false
    VideoAttachmentDetails:
      properties:
        token:
          description: Токен видео-вложения
          type: string
        urls:
          description: >-
            URL-ы для скачивания или воспроизведения видео. Может быть null,
            если видео недоступно
          nullable: true
          readOnly: false
          allOf:
            - $ref: '#/components/schemas/VideoUrls'
        thumbnail:
          description: Миниатюра видео
          nullable: true
          readOnly: false
          allOf:
            - $ref: '#/components/schemas/PhotoAttachmentPayload'
        width:
          description: Ширина видео
          type: integer
        height:
          description: Высота видео
          type: integer
        duration:
          description: Длина видео в секундах
          type: integer
      required:
        - width
        - height
        - duration
        - token
    AudioAttachment:
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/MediaAttachmentPayload'
            transcription:
              description: Аудио транскрипция
              type: string
              nullable: true
              readOnly: false
          required:
            - payload
    FileAttachment:
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/FileAttachmentPayload'
            filename:
              description: Имя загруженного файла
              type: string
            size:
              description: Размер файла в байтах
              type: integer
              format: int64
          required:
            - payload
            - filename
            - size
    AttachmentPayload:
      properties:
        url:
          description: >-
            URL медиа-вложения. Этот URL будет получен в объекте
            [Update](/docs-api/objects/Update) после отправки сообщения в чат.


            Прямую ссылку на видео также можно получить с помощью метода [`GET
            /videos/{-videoToken-}`](/docs-api/methods/GET/videos/-videoToken-)
          type: string
      required:
        - url
    MediaAttachmentPayload:
      allOf:
        - $ref: '#/components/schemas/AttachmentPayload'
        - properties:
            token:
              description: >-
                Используйте `token`, если вы пытаетесь повторно использовать
                одно и то же вложение в другом сообщении.
              type: string
          required:
            - token
    FileAttachmentPayload:
      allOf:
        - $ref: '#/components/schemas/AttachmentPayload'
        - properties:
            token:
              description: >-
                Используйте `token`, если вы пытаетесь повторно использовать
                одно и то же вложение в другом сообщении.
              type: string
          required:
            - token
    ContactAttachment:
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/ContactAttachmentPayload'
          required:
            - payload
    ContactAttachmentPayload:
      properties:
        vcf_info:
          description: Информация о пользователе в формате VCF
          nullable: true
          readOnly: false
          type: string
        hash:
          description: >-
            Хеш информации о пользователе в формате VCF. Используется для
            проверки того, что пользователь поделился номером телефона,
            привязанным к его аккаунту в МАКС<br/> Подробнее — [в разделе «Типы
            кнопок»](/docs-api#Типы%20кнопок)
          nullable: true
          readOnly: false
          type: string
        max_info:
          description: Информация о пользователе
          nullable: true
          readOnly: false
          allOf:
            - $ref: '#/components/schemas/User'
    StickerAttachmentPayload:
      allOf:
        - $ref: '#/components/schemas/AttachmentPayload'
        - properties:
            code:
              description: ID стикера
              type: string
          required:
            - code
    StickerAttachment:
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/StickerAttachmentPayload'
            width:
              description: Ширина стикера
              type: integer
            height:
              description: Высота стикера
              type: integer
          required:
            - payload
            - width
            - height
    ShareAttachmentPayload:
      description: Полезная нагрузка запроса ShareAttachmentRequest
      properties:
        url:
          description: URL, прикрепленный к сообщению в качестве предпросмотра медиа
          minLength: 1
          type: string
          nullable: true
          readOnly: false
        token:
          description: Токен вложения
          type: string
          nullable: true
          readOnly: false
    ShareAttachment:
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/ShareAttachmentPayload'
            title:
              description: Заголовок предпросмотра ссылки.
              type: string
              readOnly: false
              nullable: true
            description:
              description: Описание предпросмотра ссылки
              type: string
              readOnly: false
              nullable: true
            image_url:
              description: Изображение предпросмотра ссылки
              type: string
              nullable: true
              readOnly: false
          required:
            - payload
    LocationAttachment:
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            latitude:
              type: number
              format: double
              description: Широта
            longitude:
              type: number
              format: double
              description: Долгота
          required:
            - latitude
            - longitude
    InlineKeyboardAttachment:
      description: Кнопки в сообщении
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/Keyboard'
          required:
            - payload
    ReplyKeyboardAttachment:
      description: Custom reply keyboard in message
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            buttons:
              type: array
              items:
                type: array
                items:
                  $ref: '#/components/schemas/ReplyButton'
          required:
            - buttons
    DataAttachment:
      description: Attachment contains payload sent through `SendMessageButton`
      allOf:
        - $ref: '#/components/schemas/Attachment'
        - properties:
            data:
              type: string
          required:
            - data
    Keyboard:
      description: >-
        Клавиатура — это двумерный массив кнопок. Подробнее о типах кнопок и
        клавиатуре в ботах — [в разделе «Клавиатура для
        чат-бота»](/docs-api#Клавиатура%20для%20чат-бота)
      properties:
        buttons:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/Button'
      required:
        - buttons
    Button:
      properties:
        type:
          type: string
        text:
          description: >-
            Видимый текст кнопки. Чтобы он отображался полностью, рекомендуем не
            превышать заданное количество символов в зависимости от размещения
            текста: `20` символов — при 1 кнопке в ряду, `10` — при 2, `5` — при
            3, `3` — при 4
          type: string
          minLength: 1
          maxLength: 128
      discriminator:
        propertyName: type
        mapping:
          callback: '#/components/schemas/CallbackButton'
          link: '#/components/schemas/LinkButton'
          request_geo_location: '#/components/schemas/RequestGeoLocationButton'
          request_contact: '#/components/schemas/RequestContactButton'
          open_app: '#/components/schemas/OpenAppButton'
          message: '#/components/schemas/MessageButton'
          clipboard: '#/components/schemas/ClipboardButton'
      required:
        - type
        - text
    CallbackButton:
      description: >-
        После нажатия на такую кнопку клиент отправляет на сервер полезную
        нагрузку, которая содержит
      allOf:
        - $ref: '#/components/schemas/Button'
        - properties:
            payload:
              description: Токен кнопки
              type: string
              maxLength: 1024
          required:
            - payload
    LinkButton:
      description: >-
        После нажатия на такую кнопку пользователь переходит по ссылке, которую
        она содержит
      allOf:
        - $ref: '#/components/schemas/Button'
        - properties:
            url:
              type: string
              maxLength: 2048
          required:
            - url
    RequestContactButton:
      description: >-
        После нажатия на такую кнопку клиент отправляет новое сообщение с
        вложением текущего контакта пользователя
      allOf:
        - $ref: '#/components/schemas/Button'
    RequestGeoLocationButton:
      description: >-
        После нажатия на такую кнопку клиент отправляет новое сообщение с
        вложением текущего географического положения пользователя
      allOf:
        - $ref: '#/components/schemas/Button'
        - properties:
            quick:
              description: >-
                Если *true*, отправляет местоположение без запроса подтверждения
                пользователя
              readOnly: false
              type: boolean
              default: false
    ChatButton:
      description: >-
        Кнопка, которая создает новый чат, как только первый пользователь на нее
        нажмёт.

        BБот будет добавлен в участники чата как администратор.

        MАвтор сообщения станет владельцем чата.
      allOf:
        - $ref: '#/components/schemas/Button'
        - properties:
            chat_title:
              description: Название чата, который будет создан
              type: string
              maxLength: 200
            chat_description:
              description: Описание чата
              readOnly: false
              nullable: true
              type: string
              maxLength: 400
            start_payload:
              description: >-
                Стартовая полезная нагрузка будет отправлена боту, как только
                чат будет создан
              readOnly: false
              nullable: true
              type: string
              maxLength: 512
            uuid:
              description: >-
                Уникальный ID кнопки среди всех кнопок чата на клавиатуре.

                Если `uuid` изменён, новый чат будет создан при следующем
                нажатии.

                Сервер сгенерирует его в момент, когда кнопка будет впервые
                размещена.

                Используйте его при редактировании сообщения.'
              readOnly: false
              nullable: true
              type: integer
          required:
            - chat_title
    OpenAppButton:
      description: Кнопка для запуска мини-приложения
      allOf:
        - $ref: '#/components/schemas/Button'
        - properties:
            web_app:
              description: >-
                Публичное имя (username) бота или ссылка на него, чьё
                мини-приложение надо запустить
              readOnly: false
              type: string
            contact_id:
              description: Идентификатор бота, чьё мини-приложение надо запустить
              readOnly: false
              type: integer
              format: int64
            payload:
              description: >-
                Параметр запуска, который будет передан в
                [initData](/docs/webapps/bridge#WebAppData) мини-приложения
              readOnly: false
              type: string
    ClipboardButton:
      description: >-
        При нажатии на кнопку с типом `clipboard` текст, указанный в свойстве
        `payload`, копируется в буфер обмена
      allOf:
        - $ref: '#/components/schemas/Button'
        - properties:
            payload:
              description: Текст, который будет скопирован
              type: string
              maxLength: 1024
          required:
            - payload
    MessageButton:
      description: Кнопка для запуска мини-приложения
      allOf:
        - $ref: '#/components/schemas/Button'
        - properties:
            text:
              minLength: 1
              maxLength: 128
              description: Текст кнопки, который будет отправлен в чат от лица пользователя
              readOnly: false
              type: string
    Intent:
      description: Намерение кнопки
      type: string
      enum:
        - positive
        - negative
        - default
    ReplyButton:
      description: >-
        After pressing this type of button client will send a message on behalf
        of user with given payload
      properties:
        text:
          description: Видимый текст кнопки
          type: string
          minLength: 1
          maxLength: 128
        payload:
          description: Токен кнопки
          type: string
          maxLength: 1024
          readOnly: false
          nullable: true
      discriminator:
        propertyName: type
        mapping:
          message: '#/components/schemas/SendMessageButton'
          user_geo_location: '#/components/schemas/SendGeoLocationButton'
          user_contact: '#/components/schemas/SendContactButton'
      required:
        - text
    SendMessageButton:
      description: >-
        After pressing this type of button client will send a message on behalf
        of user with given payload
      allOf:
        - $ref: '#/components/schemas/ReplyButton'
    SendGeoLocationButton:
      description: >-
        После нажатия на такую кнопку клиент отправляет новое сообщение с
        вложением текущего географического положения пользователя
      allOf:
        - $ref: '#/components/schemas/ReplyButton'
        - properties:
            quick:
              description: >-
                Если *true*, отправляет местоположение без запроса подтверждения
                пользователя
              readOnly: false
              type: boolean
              default: false
    SendContactButton:
      description: >-
        AПосле нажатия на такую кнопку клиент отправляет новое сообщение с
        вложением текущего контакта пользователя
      allOf:
        - $ref: '#/components/schemas/ReplyButton'
    MessageLinkType:
      description: Тип связанного сообщения
      type: string
      enum:
        - forward
        - reply
    AttachmentRequest:
      description: Запрос на прикрепление данных к сообщению
      discriminator:
        propertyName: type
        mapping:
          image: '#/components/schemas/PhotoAttachmentRequest'
          video: '#/components/schemas/VideoAttachmentRequest'
          audio: '#/components/schemas/AudioAttachmentRequest'
          file: '#/components/schemas/FileAttachmentRequest'
          sticker: '#/components/schemas/StickerAttachmentRequest'
          contact: '#/components/schemas/ContactAttachmentRequest'
          inline_keyboard: '#/components/schemas/InlineKeyboardAttachmentRequest'
          location: '#/components/schemas/LocationAttachmentRequest'
          share: '#/components/schemas/ShareAttachmentRequest'
      properties:
        type:
          type: string
      required:
        - type
    PhotoAttachmentRequest:
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              allOf:
                - $ref: '#/components/schemas/PhotoAttachmentRequestPayload'
          required:
            - payload
    PhotoAttachmentRequestPayload:
      description: >-
        Запрос на прикрепление изображения (все поля являются
        взаимоисключающими)
      properties:
        url:
          description: Любой внешний URL изображения, которое вы хотите прикрепить
          minLength: 1
          nullable: true
          readOnly: false
          type: string
        token:
          description: Токен существующего вложения
          nullable: true
          readOnly: false
          type: string
        photos:
          description: Токены, полученные после загрузки изображений
          nullable: true
          readOnly: false
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PhotoToken'
    PhotoToken:
      properties:
        token:
          description: Закодированная информация загруженного изображения
          type: string
      required:
        - token
    PhotoTokens:
      description: >-
        Это информация, которую вы получите, как только изображение будет
        загружено
      properties:
        photos:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PhotoToken'
      required:
        - photos
    VideoAttachmentRequest:
      description: Запрос на прикрепление видео к сообщению
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              allOf:
                - $ref: '#/components/schemas/UploadedInfo'
          required:
            - payload
    AudioAttachmentRequest:
      description: >-
        Запрос на прикрепление аудио к сообщению. ДОЛЖЕН быть единственным
        вложением в сообщении
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              allOf:
                - $ref: '#/components/schemas/UploadedInfo'
          required:
            - payload
    UploadedInfo:
      description: >-
        Это информация, которую вы получите, как только аудио/видео будет
        загружено
      properties:
        token:
          description: Токен — уникальный ID загруженного медиафайла
          type: string
          readOnly: false
    FileAttachmentRequest:
      description: >-
        Запрос на прикрепление файла к сообщению. ДОЛЖЕН быть единственным
        вложением в сообщении
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              allOf:
                - $ref: '#/components/schemas/UploadedInfo'
          required:
            - payload
    UploadType:
      description: >-
        Тип загружаемого файла


        Поддерживаемые форматы:

        - `image`: JPG, JPEG, PNG, GIF, TIFF, BMP, HEIC

        - `video`: MP4, MOV, MKV, WEBM, MATROSKA  

        - `audio`: MP3, WAV, M4A и другие

        - `file`: любые типы файлов


        > Значение `photo` больше не поддерживается. Если вы использовали
        `type=photo` в ранее созданных интеграциях — замените его на
        `type=image`
      enum:
        - image
        - video
        - audio
        - file
    ContactAttachmentRequest:
      description: >-
        Запрос на прикрепление карточки контакта к сообщению. MДОЛЖЕН быть
        единственным вложением в сообщении
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              allOf:
                - $ref: '#/components/schemas/ContactAttachmentRequestPayload'
          required:
            - payload
    ContactAttachmentRequestPayload:
      properties:
        name:
          description: Имя контакта
          nullable: true
          type: string
        contact_id:
          description: ID контакта, если он зарегистирован в MAX
          nullable: true
          readOnly: false
          type: integer
          format: int64
        vcf_info:
          description: Полная информация о контакте в формате VCF
          nullable: true
          readOnly: false
          type: string
        vcf_phone:
          description: Телефон контакта в формате VCF
          readOnly: false
          nullable: true
          type: string
      required:
        - name
    StickerAttachmentRequest:
      description: >-
        Запрос на прикрепление стикера. ДОЛЖЕН быть единственным вложением в
        сообщении
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              allOf:
                - $ref: '#/components/schemas/StickerAttachmentRequestPayload'
          required:
            - payload
    StickerAttachmentRequestPayload:
      properties:
        code:
          description: Код стикера
          type: string
      required:
        - code
    InlineKeyboardAttachmentRequest:
      description: Запрос на прикрепление клавиатуры к сообщению
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              type: object
              allOf:
                - $ref: '#/components/schemas/InlineKeyboardAttachmentRequestPayload'
          required:
            - payload
    InlineKeyboardAttachmentRequestPayload:
      properties:
        buttons:
          description: >-
            Двумерный массив кнопок. Подробнее о типах кнопок и клавиатуре в
            ботах — [в разделе «Клавиатура для
            чат-бота»](/docs-api#Клавиатура%20для%20чат-бота)
          type: array
          minLength: 1
          items:
            type: array
            items:
              $ref: '#/components/schemas/Button'
      required:
        - buttons
    ReplyKeyboardAttachmentRequest:
      description: Request to attach reply keyboard to message
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            direct:
              description: >-
                Applicable only for chats. If `true` keyboard will be shown only
                for user bot mentioned or replied
              type: boolean
              default: false
              readOnly: false
            direct_user_id:
              description: >-
                If set to `true`, reply keyboard will only be shown to this
                participant in chat
              type: integer
              format: int64
              nullable: true
              readOnly: false
            buttons:
              description: >-
                Двумерный массив кнопок. Подробнее о типах кнопок и клавиатуре в
                ботах — [в разделе «Клавиатура для
                чат-бота»](/docs-api#Клавиатура%20для%20чат-бота)
              type: array
              minLength: 1
              items:
                type: array
                items:
                  $ref: '#/components/schemas/ReplyButton'
          required:
            - buttons
    LocationAttachmentRequest:
      description: Запрос на прикрепление клавиатуры к сообщению
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            latitude:
              type: number
              format: double
              description: Широта
            longitude:
              type: number
              format: double
              description: Долгота
          required:
            - latitude
            - longitude
    ShareAttachmentRequest:
      description: Запрос на прикрепление предпросмотра медиафайла по внешнему URL
      allOf:
        - $ref: '#/components/schemas/AttachmentRequest'
        - properties:
            payload:
              allOf:
                - $ref: '#/components/schemas/ShareAttachmentPayload'
          required:
            - payload
    MarkupElement:
      properties:
        type:
          description: >-
            Тип элемента разметки. Может быть **жирный**,  *курсив*,
            ~зачеркнутый~, <ins>подчеркнутый</ins>, `моноширинный`, выделенный,
            цитата, заголовок, ссылка или упоминание пользователя
          type: string
        from:
          description: Индекс начала элемента разметки в тексте. Нумерация с нуля
          type: integer
          format: int32
        length:
          description: Длина элемента разметки
          type: integer
          format: int32
      discriminator:
        propertyName: type
        mapping:
          strong: '#/components/schemas/StrongMarkup'
          emphasized: '#/components/schemas/EmphasizedMarkup'
          monospaced: '#/components/schemas/MonospacedMarkup'
          link: '#/components/schemas/LinkMarkup'
          strikethrough: '#/components/schemas/StrikethroughMarkup'
          underline: '#/components/schemas/UnderlineMarkup'
          user_mention: '#/components/schemas/UserMentionMarkup'
          heading: '#/components/schemas/HeadingMarkup'
          highlighted: '#/components/schemas/HighlightedMarkup'
          quote: '#/components/schemas/QuoteMarkup'
      required:
        - type
        - from
        - length
    StrongMarkup:
      description: Представляет **жирный** текст
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    EmphasizedMarkup:
      description: Представляет *курсив*
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    MonospacedMarkup:
      description: Представляет `моноширинный` или блок ```код``` в тексте
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    LinkMarkup:
      description: Представляет ссылку в тексте
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
        - properties:
            url:
              description: URL ссылки
              type: string
              minLength: 1
              maxLength: 2048
          required:
            - url
    StrikethroughMarkup:
      description: Представляет ~зачёкрнутый~ текст
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    UnderlineMarkup:
      description: Представляет <ins>подчёркнутый</ins> текст
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    HeadingMarkup:
      description: Представляет заголовок
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    QuoteMarkup:
      description: Представляет цитату
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    UserMentionMarkup:
      description: >-
        Представляет упоминание пользователя в тексте. Упоминание может быть как
        по имени пользователя, так и по ID, если у пользователя нет имени
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
        - properties:
            user_link:
              description: '`@username` упомянутого пользователя'
              type: string
              nullable: true
              readOnly: false
            user_id:
              description: ID упомянутого пользователя без имени
              type: integer
              format: int64
              nullable: true
              readOnly: false
    HighlightedMarkup:
      description: Представляет выделенный текст
      allOf:
        - $ref: '#/components/schemas/MarkupElement'
    SubscriptionRequestBody:
      description: Запрос на настройку подписки WebHook
      properties:
        url:
          description: URL HTTPS-endpoint вашего бота. Должен начинаться с `https://`
          type: string
        update_types:
          description: >-
            Список типов событий, которые хочет получать ваш бот. Полный список
            смотрите в описании объекта [Update](/docs-api/objects/Update)
          example: '["message_created", "bot_started"]'
          type: array
          uniqueItems: true
          items:
            type: string
          readOnly: false
        secret:
          description: >-
            Cекрет, который должен быть отправлен в заголовке
            `X-Max-Bot-Api-Secret` в каждом запросе Webhook. Разрешены только
            символы `A-Z`, `a-z`, `0-9`, и дефис. Заголовок рекомендован, чтобы
            запрос поступал из установленного веб-узла
          type: string
          minLength: 5
          maxLength: 256
          pattern: ^[a-zA-Z0-9_-]{5,256}$
      required:
        - url
    GetSubscriptionsResult:
      description: Список всех WebHook подписок
      properties:
        subscriptions:
          description: Список текущих подписок
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
      required:
        - subscriptions
    SimpleQueryResult:
      description: Простой ответ на запрос
      properties:
        success:
          description: '`true`, если запрос был успешным, `false` — в противном случае'
          type: boolean
        message:
          description: Объяснительное сообщение, если результат не был успешным
          type: string
          readOnly: false
      required:
        - success
    PinMessageBody:
      properties:
        message_id:
          description: >-
            ID сообщения, которое нужно закрепить. Соответствует полю
            `Message.body.mid`
          type: string
        notify:
          description: >-
            Если `true`, участники получат уведомление с системным сообщением о
            закреплении
          type: boolean
          default: true
          readOnly: false
          nullable: true
      required:
        - message_id
    GetPinnedMessageResult:
      properties:
        message:
          description: >-
            Закреплённое сообщение. Может быть `null`, если в чате нет
            закреплённого сообщения
          readOnly: false
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Message'
    Callback:
      description: Объект, отправленный боту, когда пользователь нажимает кнопку
      properties:
        timestamp:
          description: Unix-время, когда пользователь нажал кнопку
          type: integer
          format: int64
        callback_id:
          description: Текущий ID клавиатуры
          type: string
        payload:
          description: Токен кнопки
          type: string
          readOnly: false
        user:
          description: Пользователь, нажавший на кнопку
          allOf:
            - $ref: '#/components/schemas/User'
      required:
        - timestamp
        - callback_id
        - user
    CallbackAnswer:
      description: >-
        Отправьте этот объект, когда ваш бот хочет отреагировать на нажатие
        кнопки
      properties:
        message:
          description: Заполните это, если хотите изменить текущее сообщение
          nullable: true
          readOnly: false
          allOf:
            - $ref: '#/components/schemas/NewMessageBody'
        notification:
          description: >-
            Заполните это, если хотите просто отправить одноразовое уведомление
            пользователю
          nullable: true
          readOnly: false
          type: string
    Error:
      description: Сервер возвращает это, если возникло исключение при вашем запросе
      properties:
        error:
          description: Ошибка
          type: string
        code:
          description: Код ошибки
          type: string
        message:
          description: Читаемое описание ошибки
          type: string
      required:
        - code
        - message
    UploadEndpoint:
      description: Точка доступа, куда следует загружать ваши бинарные файлы
      type: object
      properties:
        url:
          description: URL для загрузки файла. Срок жизни ссылки не ограничен
          type: string
        token:
          description: Видео- или аудио-токен для отправки сообщения
          type: string
      required:
        - url
    UserIdsList:
      properties:
        user_ids:
          name: user_ids
          description: >-
            Массив ID пользователей для добавления в чат. В одном запросе можно
            передать максимум 100 идентификаторов
          required: true
          schema:
            type: array
            uniqueItems: true
            items:
              type: integer
              format: int64
              maxItems: '100'
          style: simple
      required:
        - user_ids
    ActionRequestBody:
      properties:
        action:
          $ref: '#/components/schemas/SenderAction'
      required:
        - action
    SenderAction:
      description: |
        Действие, отправляемое участникам чата. Возможные значения:
        - `"typing_on"` — Бот набирает сообщение
        - `"sending_photo"` — Бот отправляет фото
        - `"sending_video"` — Бот отправляет видео
        - `"sending_audio"` — Бот отправляет аудиофайл
        -  `"sending_file"` — Бот отправляет файл
      enum:
        - typing_on
        - sending_photo
        - sending_video
        - sending_audio
        - sending_file
    UpdateList:
      description: >-
        Список обновлений о событиях в чатах и каналах, в которые добавлен бот.
        Обратите внимание, чтобы получать события из групповых чатов и каналов,
        бот должен быть администратором
      properties:
        updates:
          description: >-
            Список обновлений о событиях в чатах и каналах, в которые добавлен
            бот. Обратите внимание, чтобы получать события из групповых чатов и
            каналов, бот должен быть администратором. Подробнее о возможных
            событиях — [в описании объекта Update](/docs-api/objects/Update)
          type: array
          items:
            $ref: '#/components/schemas/Update'
        marker:
          description: Указатель на следующую страницу данных
          type: integer
          format: int64
          nullable: true
      required:
        - updates
        - marker
    Update:
      description: "Объект `Update` описывает возможные события в чате или канале. Может возвращаться в следующих случаях:  \n\n - Вы подписались на обновления через Webhook — при наступлении события МАКС пришлёт [POST-запрос `/subscriptions`](/docs-api/methods/POST/subscriptions), который содержит объект `Update` \n\n - Вы отправили [GET-запрос\_/updates](/docs-api/methods/GET/updates) для получения обновлений через \_Long\_Polling— в ответ вернётся объект `Update` \n\n  >! Получение обновлений с помощью [Long\_Polling](/docs-api/methods/GET/updates) ограничено по скорости и сроку хранения событий\_— этот способ не подходит для production-окружения. Рекомендуем на всех этапах работы использовать [Webhook](/docs-api/methods/POST/subscriptions)\n\n ## Типы событий\n\n-\_`bot_added`\_— бот добавлен в чат или канал\n\n-\_`bot_started`\_— пользователь впервые начал общение с ботом или возобновил после остановки — нажал соответствующую кнопку в настройках бота в МАКС\n\n-\_`bot_stopped`\_— пользователь остановил бота – выбрал соответствующее действие в настройках бота в МАКС\n\n-\_`bot_removed`\_— бот удалён из чата или канала \n\n-\_`chat_title_changed`\_— пользователь изменил название чата или канала\n\n-\_`dialog_cleared`\_— пользователь очистил историю диалога с ботом\n\n-\_`dialog_muted`\_— пользователь отключил уведомления в диалоге с ботом \n\n-\_`dialog_unmuted`\_— пользователь включил уведомления в диалоге с ботом \n\n-\_`dialog_removed`\_— пользователь удалил диалог с ботом \n\n-\_`message_callback`\_— пользователь нажал на кнопку в чате или канале\n\n -\_`message_created`\_— пользователь отправил новое сообщение или опубликовал пост\n\n-\_`message_edited`\_— пользователь отредактировал сообщение в чате или канале\n\n-\_`message_removed`\_— пользователь удалил сообщение из чата или канала\n\n-\_`user_added`\_— в чат или канал добавлен или перешёл по ссылке новый пользователь\n\n-\_`user_removed`\_— пользователь удалён или покинул чат или канал \n\n ## Свойства объекта Update"
      discriminator:
        propertyName: update_type
        mapping:
          bot_added:
            $ref: '#/components/schemas/BotAddedToChatUpdate'
          bot_started:
            $ref: '#/components/schemas/BotStartedUpdate'
          bot_stopped:
            $ref: '#/components/schemas/BotStoppedUpdate'
          bot_removed:
            $ref: '#/components/schemas/BotRemovedFromChatUpdate'
          chat_title_changed:
            $ref: '#/components/schemas/ChatTitleChangedUpdate'
          dialog_cleared:
            $ref: '#/components/schemas/DialogClearedUpdate'
          dialog_muted:
            $ref: '#/components/schemas/DialogMutedUpdate'
          dialog_unmuted:
            $ref: '#/components/schemas/DialogUnmutedUpdate'
          dialog_removed:
            $ref: '#/components/schemas/DialogRemovedUpdate'
          message_callback:
            $ref: '#/components/schemas/MessageCallbackUpdate'
          message_created:
            $ref: '#/components/schemas/MessageCreatedUpdate'
          message_edited:
            $ref: '#/components/schemas/MessageEditedUpdate'
          message_removed:
            $ref: '#/components/schemas/MessageRemovedUpdate'
          user_added:
            $ref: '#/components/schemas/UserAddedToChatUpdate'
          user_removed:
            $ref: '#/components/schemas/UserRemovedFromChatUpdate'
      properties:
        update_type:
          type: string
        timestamp:
          description: Unix-время, когда произошло событие
          type: integer
          format: int64
      required:
        - update_type
        - timestamp
    MessageCallbackUpdate:
      description: Вы получите это событие, как только пользователь нажмёт кнопку
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            callback:
              description: ''
              allOf:
                - $ref: '#/components/schemas/Callback'
            message:
              description: >-
                Изначальное сообщение, содержащее встроенную клавиатуру. Может
                быть `null`, если оно было удалено к моменту, когда бот получил
                это событие
              nullable: true
              allOf:
                - $ref: '#/components/schemas/Message'
            user_locale:
              description: Текущий язык пользователя в формате IETF BCP 47
              type: string
              nullable: true
              readOnly: false
          required:
            - callback
            - message
    MessageCreatedUpdate:
      description: Вы получите это событие, как только сообщение будет создано
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            message:
              description: Новое созданное сообщение
              allOf:
                - $ref: '#/components/schemas/Message'
            user_locale:
              description: >-
                Текущий язык пользователя в формате IETF BCP 47. Доступно только
                в диалогах
              type: string
              readOnly: false
              nullable: true
          required:
            - message
    MessageRemovedUpdate:
      description: Вы получите это событие, как только сообщение будет удалено
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            message_id:
              description: ID удалённого сообщения
              type: string
            chat_id:
              description: ID чата, где сообщение было удалено
              type: integer
              format: int64
            user_id:
              description: Пользователь, удаливший сообщение
              type: integer
              format: int64
          required:
            - message_id
            - chat_id
            - user_id
    MessageEditedUpdate:
      description: Вы получите это событие, как только пользователь отредактирует сообщение
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            message:
              description: Отредактированное сообщение
              allOf:
                - $ref: '#/components/schemas/Message'
          required:
            - message
    BotAddedToChatUpdate:
      description: Вы получите это событие, как только бот будет добавлен в чат или канал
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, куда был добавлен бот
              type: integer
              format: int64
            user:
              description: Пользователь, добавивший бота в чат
              allOf:
                - $ref: '#/components/schemas/User'
            is_channel:
              description: Указывает, что бот добавлен в канал, а не в чат
              type: boolean
          required:
            - chat_id
            - user
            - is_channel
    BotRemovedFromChatUpdate:
      description: Вы получите это событие, как только бот будет удалён из чата
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, откуда был удалён бот
              type: integer
              format: int64
            user:
              description: Пользователь, удаливший бота из чата
              allOf:
                - $ref: '#/components/schemas/User'
            is_channel:
              description: Указывает, что бот удалён из канала, а не из чата
              type: boolean
          required:
            - chat_id
            - user
            - is_channel
    DialogMutedUpdate:
      description: >-
        Вы получите это событие, как только пользователь отключит уведомления о
        новых сообщениях в диалоге с ботом
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, который отключил уведомления
              allOf:
                - $ref: '#/components/schemas/User'
            muted_until:
              description: >-
                Время в формате Unix, до наступления которого диалог был
                отключён
              type: integer
              format: int64
            user_locale:
              description: Текущий язык пользователя в формате IETF BCP 47
              type: string
          required:
            - chat_id
            - user
            - muted_until
    DialogUnmutedUpdate:
      description: >-
        Вы получите это событие, как только пользователь включит уведомления о
        новых сообщениях в диалоге с ботом
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, который включил уведомления
              allOf:
                - $ref: '#/components/schemas/User'
            user_locale:
              description: Текущий язык пользователя в формате IETF BCP 47
              type: string
          required:
            - chat_id
            - user
    DialogClearedUpdate:
      description: >-
        Вы получите это событие, как только пользователь очистит историю
        сообщений
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, который очистил историю сообщений
              allOf:
                - $ref: '#/components/schemas/User'
            user_locale:
              description: Текущий язык пользователя в формате IETF BCP 47
              type: string
          required:
            - chat_id
            - user
    DialogRemovedUpdate:
      description: Вы получите это событие, как только пользователь удалит чат
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, который удалил чат
              allOf:
                - $ref: '#/components/schemas/User'
            user_locale:
              description: Текущий язык пользователя в формате IETF BCP 47
              type: string
          required:
            - chat_id
            - user
    UserAddedToChatUpdate:
      description: >-
        Вы получите это событие, как только пользователь будет добавлен в чат,
        где бот является администратором
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, добавленный в чат
              allOf:
                - $ref: '#/components/schemas/User'
            inviter_id:
              description: >-
                Пользователь, который добавил нового пользователя в чат. Может
                быть `null`, если пользователь присоединился к чату по ссылке
              type: integer
              format: int64
              readOnly: false
              nullable: true
            is_channel:
              description: Указывает, что пользователь добавлен в канал, а не в чат
              type: boolean
          required:
            - chat_id
            - user
            - is_channel
    UserRemovedFromChatUpdate:
      description: >-
        Вы получите это событие, как только пользователь будет удалён из чата,
        где бот является администратором
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, удалённый из чата
              allOf:
                - $ref: '#/components/schemas/User'
            admin_id:
              description: >-
                Администратор, который удалил пользователя из чата. Может быть
                `null`, если пользователь покинул чат сам
              type: integer
              format: int64
              readOnly: false
            is_channel:
              description: Указывает, что пользователь удалён из канала, а не из чата
              type: boolean
          required:
            - chat_id
            - user
            - is_channel
    BotStartedUpdate:
      description: >-
        Вы получите это событие, как только пользователь начнёт или возобновит
        общение с ботом: нажмёт соответствующую кнопку в настройках бота в МАКС
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID диалога, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, который нажал кнопку `Start`
              allOf:
                - $ref: '#/components/schemas/User'
            payload:
              description: Дополнительные данные из диплинков, переданные при запуске бота
              type: string
              maxLength: 512
              nullable: true
              readOnly: false
            user_locale:
              description: Текущий язык пользователя в формате IETF BCP 47
              type: string
              readOnly: false
          required:
            - chat_id
            - user
    BotStoppedUpdate:
      description: >-
        Вы получите это событие, как только пользователь остановит бота в его
        настройках в МАКС
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID диалога, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, который остановил бота
              allOf:
                - $ref: '#/components/schemas/User'
            user_locale:
              description: Текущий язык пользователя в формате IETF BCP 47
              type: string
              readOnly: false
          required:
            - chat_id
            - user
