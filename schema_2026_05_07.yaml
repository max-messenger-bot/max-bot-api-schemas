      description: Вы получите это событие, как только будет изменено название чата
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat_id:
              description: ID чата, где произошло событие
              type: integer
              format: int64
            user:
              description: Пользователь, который изменил название
              allOf:
                - $ref: '#/components/schemas/User'
            title:
              description: Новое название
              type: string
          required:
            - chat_id
            - user
            - title
    MessageChatCreatedUpdate:
      description: >-
        Вы получите это событие, как только пользователь нажмёт в сообщении на
        кнопку с типом `chat` и будет создан новый чат с ботом, связанный с этим
        сообщением с кнопкой
      allOf:
        - $ref: '#/components/schemas/Update'
        - properties:
            chat:
              description: Созданный чат
              allOf:
                - $ref: '#/components/schemas/Chat'
            message_id:
              description: ID сообщения, где была нажата кнопка
              type: string
            start_payload:
              description: Полезная нагрузка от кнопки чата
              type: string
              nullable: true
              readOnly: false
          required:
            - message_id
            - chat
    ModifyMembersResult:
      description: Результат запроса на изменение списка участников
      allOf:
        - $ref: '#/components/schemas/SimpleQueryResult'
        - properties:
            failed_user_ids:
              description: ID пользователей, которых не удалось добавить
              type: array
              items:
                type: integer
                format: int64
              nullable: true
              readOnly: false
            failed_user_details:
              description: Подробное описание, почему пользователь не был добавлен в чат
              type: array
              items:
                $ref: '#/components/schemas/FailedUserDetails'
              nullable: true
              readOnly: false
    FailedUserDetails:
      description: Подробное описание, почему пользователь не был добавлен в чат
      properties:
        error_code:
          description: >-
            Код ошибки


            Возможные значения:


            - `add.participant.privacy` — ошибки конфиденциальности при
            добавлении пользователей


            - `add.participant.not.found` — пользователи не найдены
          type: string
        user_ids:
          description: ID пользователей с данной ошибкой
          type: array
          items:
            type: integer
            format: int64
          nullable: false
      required:
        - error_code
        - user_ids

