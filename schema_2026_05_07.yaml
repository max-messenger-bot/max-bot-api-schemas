openapi: 3.0.0
info:
  version: 0.0.30
  title: Max Bot API
  license:
    name: Apache 2.0
  description: >-
    # About

    Bot API allows bots to interact with Max. Methods are called by sending
    HTTPS requests to [platform-api.max.ru](https://platform-api.max.ru) domain.

    Bots are third-party applications that use Max features. A bot can
    legitimately take part in a conversation. It can be achieved through HTTP
    requests to the Max Bot API.


    ## Features

    Max bots of the current version are able to:

    - Communicate with users and respond to requests

    - Recommend users complete actions via programmed buttons

    - Request personal data from users (name, short reference, phone number)

    We'll keep working on expanding bot capabilities in the future.


    ## Examples

    Bots can be used for the following purposes:

    - Providing support, answering frequently asked questions

    - Sending typical information

    - Voting

    - Likes/dislikes

    - Following external links

    - Forwarding a user to a chat/channel


    ## HTTP verbs

    `GET` &mdash; getting resources, parameters are transmitted via URL


    `POST` &mdash; creation of resources (for example, sending new messages)


    `PUT` &mdash; editing resources


    `DELETE` &mdash; deleting resources


    `PATCH` &mdash; patching resources


    ## HTTP response codes

    `200` &mdash; successful operation


    `400` &mdash; invalid request


    `401` &mdash; authentication error


    `404` &mdash; resource not found


    `405` &mdash; method is not allowed


    `429` &mdash; the number of requests is exceeded


    `503` &mdash; service unavailable


    ## Resources format

    For content requests (PUT and POST) and responses, the API uses the JSON
    format.

    All strings are UTF-8 encoded.

    Date/time fields are represented as the number of milliseconds that have
    elapsed since 00:00 January 1, 1970 in the long format. To get it, you can
    simply multiply the UNIX timestamp by 1000. All date/time fields have a UTC
    timezone.

    ## Error responses

    In case of an error, the API returns a response with the corresponding HTTP
    code and JSON with the following fields:


    `code` - the string with the error key


    `message` - a string describing the error </br>


    For example:

    ```bash

    > http https://platform-api.max.ru/chats?access_token={EXAMPLE_TOKEN}

    HTTP / 1.1 403 Forbidden

    Cache-Control: no-cache

    Connection: Keep-Alive

    Content-Length: 57

    Content-Type: application / json; charset = utf-8

    Set-Cookie: web_ui_lang = ru; Path = /; Domain = .max.ru; Expires =
    2019-03-24T11: 45: 36.500Z

    {
       "code": "verify.token",
       "message": "Invalid access_token"
    }

    ```

    ## Receiving notifications

    Max Bot API supports 2 options of receiving notifications on new events for
    bots:

    - Push notifications via WebHook. To receive data via WebHook, you'll have
    to [add
    subscription](https://dev.max.ru/docs-api/methods/POST/subscriptions);

    - Notifications upon request via [long
    polling](/docs-api/methods/GET/updates) API. All data can be received via
    long polling **by default** after creating the bot.


    Both methods **cannot** be used simultaneously.

    Refer to the response schema of
    [GET:/updates](https://dev.max.ru/docs-api/methods/GET/updates) method to
    check all available types of updates.


    ### Webhook

    There is some notes about how we handle webhook subscription:

    1. Sometimes webhook notification cannot be delivered in case when bot
    server or network is down.

      In such case we well retry delivery in a short period of time (from 30 to 60 seconds) and will do this until get
      `200 OK` status code from your server, but not longer than **8 hours** (*may change over time*) since update happened.

      We also consider any non `200`-response from server as failed delivery.

    2. To protect your bot from unexpected high load we send **no more than
    100** notifications per second by default.
      If you want increase this limit, contact us at [@support](https://max.ru/support).


    It should be from one of the following subnets:

    ```

    185.16.150.0/30

    185.16.150.84/30

    185.16.150.152/30

    185.16.150.192/30

    ```



    ## Message buttons

    You can program buttons for users answering a bot.

    Max supports the following types of buttons:


    `callback` &mdash; sends a notification with payload to a bot (via WebHook
    or long polling)


    `link` &mdash; makes a user to follow a link


    `request_contact` &mdash; requests the user permission to access contact
    information (phone number, short link, email)


    `request_geo_location` &mdash; asks user to provide current geo location


    `chat` &mdash; creates chat associated with message


    To start create buttons [send message](/docs-api/methods/POST/messages) with
    `InlineKeyboardAttachment`:

    ```json

    {
      "text": "It is message with inline keyboard",
      "attachments": [
        {
          "type": "inline_keyboard",
          "payload": {
            "buttons": [
              [
                {
                  "type": "callback",
                  "text": "Press me!",
                  "payload": "button1 pressed"
                }
              ],
              [
                {
                  "type": "chat",
                  "text": "Discuss",
                  "chat_title": "Message discussion"
                }
              ]
            ]
          }
        }
      ]
    }

    ```

    ### Chat button

    Chat button is a button that starts chat assosiated with the current
    message. It will be **private** chat with a link, bot will be added as
    administrator by default.


    Chat will be created as soon as the first user taps on button. Bot will
    receive `message_chat_created` update.


    Bot can set title and description of new chat by setting `chat_title` and
    `chat_description` properties.


    Whereas keyboard can contain several `chat`-buttons there is `uuid` property
    to distinct them between each other.

    In case you do not pass `uuid` we will generate it. If you edit message,
    pass `uuid` so we know that this button starts the same chat as before.


    Chat button also can contain `start_payload` that will be sent to bot as
    part of `message_chat_created` update.


    ## Deep linking

    Max supports deep linking mechanism for bots. It allows passing additional
    payload to the bot on startup.

    Deep link can contain any data encoded into string up to **512** characters
    long. Longer strings will be omitted and **not** passed to the bot.


    Each bot has start link that looks like:

    ```

    https://max.ru/<botName>?start=<payload>

    ```

    As soon as user clicks on such link we open dialog with bot and send this
    payload to bot as part of `bot_started` update:

    ```json

    {
        "update_type": "bot_started",
        "timestamp": 1573226679188,
        "chat_id": 1234567890,
        "user": {
            "user_id": 1234567890,
            "name": "Boris",
            "username": "borisd84"
        },
        "payload": "any data meaningful to bot"
    }

    ```


    Deep linking mechanism is supported for iOS version 2.7.0 and Android 2.9.0
    and higher.


    ## Text formatting


    Message text can be improved with basic formatting such as: **strong**,
    *emphasis*, ~strikethough~, 

    <ins>underline</ins>, `code` or link. You can use either markdown-like or
    HTML formatting.


    To enable text formatting set the `format` property of
    [NewMessageBody](#tag/new_message_model).


    ### Max flavored Markdown

    To enable [Markdown](https://spec.commonmark.org/0.29/) parsing, set the
    `format` property of [NewMessageBody](#tag/new_message_model) to `markdown`.


    We currently support only the following syntax:


    `*empasized*` or `_empasized_` for *italic* text


    `**strong**` or `__strong__` for __bold__ text


    `~~strikethough~~`  for ~strikethough~ text


    `++underline++`  for <ins>underlined</ins> text


    ``` `code` ``` or ` ```code``` ` for `monospaced` text


    `^^important^^` for highlighted text (colored in red, by default)


    `[Inline URL](https://dev.max.ru/)` for inline URLs


    `[User mention](max://user/%user_id%)` for user mentions without username


    `# Header` for header


    ### HTML support


    To enable HTML parsing, set the `format` property of
    [NewMessageBody](#tag/new_message_model) to `html`.
     
    Only the following HTML tags are supported. All others will be stripped:


    Emphasized: `<i>` or `<em>`


    Strong: `<b>` or `<strong>`


    Strikethrough: `<del>` or `<s>`


    Underlined: `<ins>` or `<u>`


    Link: `<a href="https://dev.max.ru">Docs</a>`


    Monospaced text: `<pre>` or `<code>`


    Highlighted text: `<mark>`


    Header: `<h1>`


    Text formatting is supported for iOS since version 3.1 and Android since
    2.20.0.


    # Versioning

    API models and interface may change over time. To make sure your bot will
    get the right info, we strongly recommend adding API version number to each
    request. You can add it as `v` parameter to each HTTP-request. For instance,
    `v=0.1.2`.

    To specify the data model version you are getting through WebHook
    subscription, use the `version` property in the request body of the
    [subscribe](https://dev.max.ru/docs-api/methods/POST/subscriptions) request.


    # Libraries

    We have developed the official [Java
    client](https://github.com/tamtam-chat/tamtam-bot-api) and
    [SDK](https://github.com/tamtam-chat/tamtam-bot-sdk).


    # Changelog

    To see changelog for older versions visit our
    [GitHub](https://github.com/tamtam-chat/tamtam-bot-api-schema/releases).
servers:
  - url: https://platform-api.max.ru
security:
  - access_token: []
tags:
  - name: user_model
    x-displayName: User
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/User"/>
  - name: chat_model
    x-displayName: Chat
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/Chat"/>
  - name: message_model
    x-displayName: Message
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/Message"/>
  - name: new_message_model
    x-displayName: NewMessageBody
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/NewMessageBody"/>
  - name: update_model
    x-displayName: Update
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/Update"/>
x-tagGroups:
  - name: Methods
    tags:
      - bots
      - chats
      - messages
      - subscriptions
      - upload
  - name: Objects
    tags:
      - user_model
      - chat_model
      - message_model
      - new_message_model
      - update_model
paths:
  /me:
    get:
      tags:
        - bots
      summary: Получение информации о боте
      operationId: getMyInfo
      description: >-
        Метод возвращает информацию о боте, который идентифицируется с помощью
        токена доступа `access_token`. В ответе приходит [объект User с
        вариантом наследования BotInfo](/docs-api/objects/User), который
        содержит идентификатор бота, его название, никнейм, время последней
        активности, описание и аватар (при наличии)


        Пример запроса:

        ```bash

        curl -X GET "https://platform-api.max.ru/me" \
          -H "Authorization: {access_token}"
        ```
      responses:
        '200':
          description: Информация о боте
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /chats:
    get:
      tags:
        - chats
      operationId: getChats
      description: >-
        Возвращает список групповых чатов, в которых участвовал бот, информацию
        о каждом чате и маркер для перехода к следующей странице списка


        Пример запроса:

        ```bash

        curl -X GET "https://platform-api.max.ru/chats" \
          -H "Authorization: {access_token}"
        ```
      summary: Получение списка всех групповых чатов
      parameters:
        - description: Количество запрашиваемых чатов
          name: count
          in: query
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 50
        - description: >-
            Указатель на следующую страницу данных. Для первой страницы
            передайте `null`
          name: marker
          in: query
          schema:
            $ref: '#/components/schemas/bigint'
      responses:
        '200':
          description: В ответе с пагинацией возвращаются чаты
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /chats/{chatId}:
    get:
      tags:
        - chats
      x-opGroup: chat
      operationId: getChat
      description: |-
        Возвращает информацию о групповом чате по его ID

        Пример запроса:
        ```bash
        curl -X GET "https://platform-api.max.ru/chats/{chatId}" \
          -H "Authorization: {access_token}"
        ```
      summary: Получение информации о групповом чате
      parameters:
        - name: chatId
          description: ID запрашиваемого чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      responses:
        '200':
          description: Информация о чате
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags:
        - chats
      x-opGroup: chat
      operationId: editChat
      description: >-
        Позволяет редактировать информацию о групповом чате, включая название,
        иконку и закреплённое сообщение


        Пример запроса:

        ```bash

        curl -X PATCH "https://platform-api.max.ru/chats/{chatId}" \
          -H "Authorization: {access_token}" \
          -H "Content-Type: application/json" \
          -d '{
          "icon": { "url": "https://example.com/image.jpg" },
          "title": "Название чата",
          "notify": true
        }'

        ```
      summary: Изменение информации о групповом чате
      parameters:
        - name: chatId
          description: ID чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatPatch'
      responses:
        '200':
          description: If success, returns updated chat object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - chats
      x-opGroup: chat
      operationId: deleteChat
      description: |-
        Удаляет групповой чат для всех участников

        Пример запроса:
        ```bash
        curl -X DELETE "https://platform-api.max.ru/chats/{chatId}" \
          -H "Authorization: {access_token}"
        ```
      summary: Удаление группового чата
      parameters:
        - name: chatId
          description: ID чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /chats/{chatId}/actions:
    post:
      tags:
        - chats
      operationId: sendAction
      description: >-
        Позволяет отправлять в групповой чат такие действия бота, как например:
        «набор текста» или «отправка фото»


        Пример запроса:

        ```bash

        curl -X POST "https://platform-api.max.ru/chats/{chatId}/actions" \
          -H "Authorization: {access_token}" \
          -H "Content-Type: application/json" \
          -d '{
          "action": "typing_on"
        }'

        ```
      summary: Отправка действия бота в групповой чат
      parameters:
        - name: chatId
          description: ID чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionRequestBody'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /chats/{chatId}/pin:
    get:
      tags:
        - chats
      operationId: getPinnedMessage
      description: |-
        Возвращает закреплённое сообщение в групповом чате

        Пример запроса:
        ```bash
        curl -X GET "https://platform-api.max.ru/chats/{chatId}/pin" \
          -H "Authorization: {access_token}"
        ```
      summary: Получение закреплённого сообщения в групповом чате
      parameters:
        - name: chatId
          description: ID чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      responses:
        '200':
          description: Закреплённое сообщение
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPinnedMessageResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
        - chats
      operationId: pinMessage
      description: |-
        Закрепляет сообщение в групповом чате

        Пример запроса:
        ```bash
        curl -X PUT "https://platform-api.max.ru/chats/{chatId}/pin" \
          -H "Authorization: {access_token}" \
          -H "Content-Type: application/json" \
          -d '{
          "message_id": "{message_id}",
          "notify": true
        }'
        ```
      summary: Закрепление сообщения в групповом чате
      parameters:
        - name: chatId
          description: ID чата, где должно быть закреплено сообщение
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinMessageBody'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - chats
      operationId: unpinMessage
      description: |-
        Удаляет закреплённое сообщение в групповом чате

        Пример запроса:
        ```bash
        curl -X DELETE "https://platform-api.max.ru/chats/{chatId}/pin" \
          -H "Authorization: {access_token}"
        ```
      summary: Удаление закреплённого сообщения в групповом чате
      parameters:
        - name: chatId
          description: ID чата, из которого нужно удалить закреплённое сообщение
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /chats/{chatId}/members/me:
    get:
      tags:
        - chats
      x-opGroup: myMembership
      operationId: getMembership
      summary: Получение информации о членстве бота в групповом чате
      description: >-
        Возвращает информацию о членстве текущего бота в групповом чате. Бот
        идентифицируется с помощью токена доступа


        Пример запроса:

        ```bash

        curl -X GET "https://platform-api.max.ru/chats/{chatId}/members/me" \
          -H "Authorization: {access_token}"
        ```
      parameters:
        - name: chatId
          description: ID чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      responses:
        '200':
          description: Текущаяя информация о членстве бота
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMember'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - chats
      operationId: leaveChat
      x-opGroup: myMembership
      summary: Удаление бота из группового чата
      description: |-
        Удаляет бота из участников группового чата

        Пример запроса:
        ```bash
        curl -X DELETE "https://platform-api.max.ru/chats/{chatId}/members/me" \
          -H "Authorization: {access_token}"
        ```
      parameters:
        - name: chatId
          description: ID чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /chats/{chatId}/members/admins:
    get:
      tags:
        - chats
      operationId: getAdmins
      summary: Получение списка администраторов группового чата
      description: >-
        Возвращает список всех администраторов группового чата. Бот должен быть
        администратором в запрашиваемом чате


        Пример запроса:

        ```bash

        curl -X GET "https://platform-api.max.ru/chats/{chatId}/members/admins"
        \
          -H "Authorization: {access_token}"
        ```
      parameters:
        - name: chatId
          description: ID чата
          required: true
          in: path
          schema:
            type: integer
            format: int64
            pattern: \-?\d+
      responses:
        '200':
          description: Список администраторов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMembersList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - chats
      operationId: postAdmins
      description: >-
        Возвращает значение `true`, если в групповой чат добавлены все
        администраторы 


        Пример запроса:

        ```bash

        curl -X POST "https://platform-api.max.ru/chats/{chatId}/members/admins"
        \
          -H "Authorization: {access_token}" \
          -H "Content-Type: application/json" \
          -d '{
          "admins": [
            {
              "user_id": "{user_id}",
              "permissions": [
